name: Create infrastructure
concurrency: build-deploy-or-infrastructure

on:
  push:
    paths:
      - 'infrastructure/**'
      - '.github/workflows/infrastructure-apply.yml'
    branches:
      - main
  workflow_dispatch:
    inputs:
      iamActionsRoleArn:
        description: 'IAM role ARN to assume for actions'
        type: string
        required: false
        default: ''
      iamInfrastructureRoleArn:
        description: 'IAM role ARN to assume for infrastructure'
        type: string
        required: false
        default: ''

jobs:
  terragrunt-apply:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:

      - uses: actions/checkout@v3

      - name: Install Terragrunt
        run: sudo apt-get install -y wget &&
          wget https://github.com/gruntwork-io/terragrunt/releases/download/v0.43.0/terragrunt_linux_386 --output-document ./terragrunt &&
          chmod u+x ./terragrunt &&
          ./terragrunt --version

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1-node16
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::541134664601:role/intention-com-web-infrastructure-role

      - name: Terragrunt apply
        run: ./terragrunt apply -auto-approve --terragrunt-non-interactive --terragrunt-working-dir ./infrastructure
