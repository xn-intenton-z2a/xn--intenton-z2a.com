name: Deploy

on:
  push:
    branches-ignore:
      - 'dependabot/**'
  workflow_dispatch:
    inputs:
      environment-name:
        description: 'Environment name (ci or prod). Auto-detected from branch if empty.'
        type: string
        required: false
        default: ''
      skip-deploy:
        description: 'Skip CDK deploy (build and synth only)'
        type: boolean
        required: false
        default: false

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:

  params:
    runs-on: ubuntu-latest
    outputs:
      environment-name: ${{ steps.env.outputs.environment-name }}
      skip-deploy: ${{ steps.env.outputs.skip-deploy }}
    steps:
      - name: Determine environment
        id: env
        run: |
          # Manual input takes priority
          ENV_NAME="${{ inputs.environment-name }}"
          if [ -z "$ENV_NAME" ]; then
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              ENV_NAME="prod"
            else
              ENV_NAME="ci"
            fi
          fi
          echo "environment-name=${ENV_NAME}" >> "$GITHUB_OUTPUT"
          echo "skip-deploy=${{ inputs.skip-deploy || 'false' }}" >> "$GITHUB_OUTPUT"
          echo "Environment: ${ENV_NAME}"

  deploy:
    needs: params
    runs-on: ubuntu-latest
    environment: ${{ needs.params.outputs.environment-name }}

    permissions:
      contents: read
      id-token: write

    env:
      ENVIRONMENT_NAME: ${{ needs.params.outputs.environment-name }}
      CERTIFICATE_ARN: ${{ vars.CERTIFICATE_ARN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Configure AWS Credentials (GitHub Actions role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.ACTIONS_ROLE_ARN }}
          role-chaining: false
          aws-region: us-east-1
          audience: sts.amazonaws.com
          role-skip-session-tagging: true
          output-credentials: true
          retry-max-attempts: 3

      - name: Configure AWS Credentials (Deployment role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.DEPLOY_ROLE_ARN }}
          role-chaining: true
          aws-region: us-east-1
          audience: sts.amazonaws.com
          role-skip-session-tagging: true
          output-credentials: true
          retry-max-attempts: 3

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Build and test
        run: ./mvnw --batch-mode clean verify

      - name: CDK synth
        run: npx cdk synth "${{ env.ENVIRONMENT_NAME }}-web-stack"

      - name: CDK deploy
        if: needs.params.outputs.skip-deploy != 'true'
        run: npx cdk deploy "${{ env.ENVIRONMENT_NAME }}-web-stack" --require-approval never --ci true

      - name: Verify and repair DNS records
        if: needs.params.outputs.skip-deploy != 'true'
        run: |
          STACK_NAME="${{ env.ENVIRONMENT_NAME }}-web-stack"
          HOSTED_ZONE_ID="Z09934692CHZL2KPE9Q9F"
          CLOUDFRONT_HOSTED_ZONE_ID="Z2FDTNDATAQYW2"

          # Determine expected domain name
          if [ "${{ env.ENVIRONMENT_NAME }}" = "prod" ]; then
            DOMAIN="xn--intenton-z2a.com"
            RECORD_NAME="xn--intenton-z2a.com"
          else
            DOMAIN="${{ env.ENVIRONMENT_NAME }}.web.xn--intenton-z2a.com"
            RECORD_NAME="${{ env.ENVIRONMENT_NAME }}.web.xn--intenton-z2a.com"
          fi

          # Get CloudFront distribution domain from stack outputs
          CF_DOMAIN=$(aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query "Stacks[0].Outputs[?OutputKey=='DistributionDomainName'].OutputValue" \
            --output text)
          echo "CloudFront domain: $CF_DOMAIN"
          echo "Expected DNS: $DOMAIN -> $CF_DOMAIN"

          if [ -z "$CF_DOMAIN" ]; then
            echo "::warning::Could not read CloudFront domain from stack outputs — skipping DNS verification"
            exit 0
          fi

          # Check if A record exists in Route53
          EXISTING=$(aws route53 list-resource-record-sets \
            --hosted-zone-id "$HOSTED_ZONE_ID" \
            --query "ResourceRecordSets[?Name=='${RECORD_NAME}.' && Type=='A'].AliasTarget.DNSName" \
            --output text)

          if [ -n "$EXISTING" ] && [ "$EXISTING" != "None" ]; then
            echo "DNS records exist: $EXISTING"
          else
            echo "::warning::DNS records missing for $DOMAIN — creating them now"
            aws route53 change-resource-record-sets \
              --hosted-zone-id "$HOSTED_ZONE_ID" \
              --change-batch "{
                \"Changes\": [
                  {
                    \"Action\": \"UPSERT\",
                    \"ResourceRecordSet\": {
                      \"Name\": \"$RECORD_NAME\",
                      \"Type\": \"A\",
                      \"AliasTarget\": {
                        \"HostedZoneId\": \"$CLOUDFRONT_HOSTED_ZONE_ID\",
                        \"DNSName\": \"$CF_DOMAIN\",
                        \"EvaluateTargetHealth\": false
                      }
                    }
                  },
                  {
                    \"Action\": \"UPSERT\",
                    \"ResourceRecordSet\": {
                      \"Name\": \"$RECORD_NAME\",
                      \"Type\": \"AAAA\",
                      \"AliasTarget\": {
                        \"HostedZoneId\": \"$CLOUDFRONT_HOSTED_ZONE_ID\",
                        \"DNSName\": \"$CF_DOMAIN\",
                        \"EvaluateTargetHealth\": false
                      }
                    }
                  }
                ]
              }"
            echo "DNS records created for $DOMAIN -> $CF_DOMAIN"
          fi

          # Verify DNS resolves (allow up to 60s for propagation)
          echo "Verifying DNS resolution for $DOMAIN..."
          for i in 1 2 3 4 5 6; do
            RESOLVED=$(dig +short "$DOMAIN" A 2>/dev/null || true)
            if [ -n "$RESOLVED" ]; then
              echo "DNS resolves: $DOMAIN -> $RESOLVED"
              exit 0
            fi
            echo "  Attempt $i: not yet resolving, waiting 10s..."
            sleep 10
          done
          echo "::warning::DNS not resolving after 60s — may need more time to propagate (negative cache TTL)"
