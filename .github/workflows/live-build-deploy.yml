name: Build and deploy live
concurrency: build-deploy-or-infrastructure

on:
  workflow_dispatch:

jobs:
  terragrunt-apply-stage:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:

      - uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1-node16
        with:
          aws-region: eu-west-2
          role-to-assume: arn:aws:iam::541134664601:role/intenton-com-web-deployment-role

      # TODO Deploy