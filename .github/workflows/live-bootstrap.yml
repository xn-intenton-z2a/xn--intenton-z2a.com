name: Bootstrap live

on:
  workflow_dispatch:
    inputs:
      iamActionsRoleArn:
        description: 'IAM role ARN to assume for actions'
        type: string
        required: false
        default: ''
      iamDeploymentRoleArn:
        description: 'IAM role ARN to assume for deployment'
        type: string
        required: false
        default: ''

jobs:
  live-bootstrap:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    env:
      iamActionsRoleArn: ${{ inputs.iamActionsRoleArn || 'arn:aws:iam::541134664601:role/agentic-lib-github-actions-role' }}
      iamDeploymentRoleArn: ${{ inputs.iamDeploymentRoleArn || 'arn:aws:iam::541134664601:role/intention-com-web-deployment-role' }}

    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci || npm install

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.iamActionsRoleArn }}
          role-chaining: false
          aws-region: eu-west-2
          audience: sts.amazonaws.com
          role-skip-session-tagging: true
          output-credentials: true
          retry-max-attempts: 3

      - run: aws sts get-caller-identity

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.iamDeploymentRoleArn }}
          role-chaining: true
          aws-region: eu-west-2
          audience: sts.amazonaws.com
          role-skip-session-tagging: true
          output-credentials: true
          retry-max-attempts: 3

      - name: Check AWS CLI version
        run: aws --version ; echo ;

      - name: Check Java and Maven versions
        run: ./mvnw --version ; echo ;

      - name: Check Node version
        run:  node --version ;

      - name: Check AWS CDK versions
        run: cdk --version ; echo ;

      - name: Check AWS authentication
        run: aws sts get-caller-identity ;

      - name: Bootstrap Network stack
        run: cd ./network-stack ; export TARGET_ENV='live' ; cdk bootstrap ;

      - name: Bootstrap Telemetry stack
        run: cd ./telemetry-stack ; export TARGET_ENV='live' ; cdk bootstrap ;

      - name: Bootstrap Application stack
        run: cd ./application-stack ; export TARGET_ENV='live' ; cdk bootstrap ;
