# agentic-lib-repositories.toml — Showcase repository configuration
# Used by index.html to populate the multi-repo showcase bar, grid, and discussions.
#
# To add a new repository:
#   1. Add a [[repositories]] entry below
#   2. Get the repo-id from: gh api repos/xn-intenton-z2a/<name> --jq '.node_id'
#   3. Get the category-id from: gh api graphql -f query='{ repository(owner:"xn-intenton-z2a", name:"<name>") { discussionCategories(first:5) { nodes { id name } } } }' --jq '.data.repository.discussionCategories.nodes[] | select(.name == "General") | .id'
#   4. Install giscus on the repo at https://github.com/apps/giscus

[owner]
name = "xn-intenton-z2a"

