<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta http-equiv="X-UA-Compatible" content="ie=edge"/>
    <title>intentïon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #B2B9BC; /* Blue sky hints */
            overflow: hidden;
            font-family: sans-serif;
            width: 100vw;
            height: 100vh;
            position: relative;
            z-index: 0;
        }
        .fogOne, .fogTwo, .fogThree, .fogFour, .fogFive {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            animation: fadeInOut 10s infinite;
            pointer-events: none; /* Allow mouse events to pass through to elements below */
            z-index: 5; /* Lower than intention but above body */
        }
        .fogOne { background: url('vecteezy_white-fog-illustration_24065516-bottom-low.png') no-repeat center center; animation-duration: 3s; }
        .fogTwo { background: url('vecteezy_white-fog-illustration_24065530-bottom-risen.png') no-repeat center center; animation-duration: 4s; }
        .fogThree { background: url('vecteezy_white-fog-illustration_24065547-centre.png') no-repeat center center; animation-duration: 5s; }
        .fogFour { background: url('vecteezy_white-fog-illustration_24065523-corner-bottom-right.png') no-repeat center center; animation-duration: 6s; }
        .fogFive { background: url('vecteezy_white-fog-illustration_24065528-diagonal-down-right.png') no-repeat center center; animation-duration: 7s; }

        @keyframes fadeInOut {
            0%,100% { opacity: 0; }
            50%     { opacity: 1; }
        }

        /* VT100 Terminal Emulator Styles */
        #terminal-container {
            position: absolute;
            top: 35%;
            /*transform: translateY(-15%);*/
            right: 5%;
            width: 90vw; /* 2/3 of viewport width */
            height: calc(65vw * 9 / 16); /* 16:9 aspect ratio */
            background-color: #000;
            opacity: 0.4;
            border: 2px solid #00FF00;
            border-radius: 5px;
            padding: 10px;
            box-sizing: border-box;
            font-family: "Courier New", monospace;
            overflow-y: auto; /* Changed from hidden to auto to enable vertical scrolling */
            z-index: 600;
        }

        #terminal-output {
            color: #00FF00; /* Classic green screen color */
            font-size: 1vw;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .cursor {
            display: inline-block;
            width: 0.8em;
            height: 1em;
            background-color: #00FF00;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        /* Mission link */
        #mission-link {
            position: fixed;
            top: 8px;
            right: 8px;
            color: #3F5965;
            font-family: sans-serif;
            font-size: 1.2vw;
            font-weight: bold;
            text-decoration: none;
            opacity: 0.7;
            transition: opacity 0.3s;
            z-index: 2500;
            cursor: pointer;
            background-color: transparent;
            padding: 4px 16px;
            border-radius: 4px;
        }

        #mission-link:hover {
            opacity: 1;
        }

        /* Mission lightbox */
        #mission-lightbox {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 5000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #mission-lightbox.active {
            display: flex;
        }

        #mission-lightbox .mission-content {
            background: #fff;
            color: #333;
            max-width: 80vw;
            max-height: 70vh;
            overflow-y: auto;
            padding: 32px;
            border-radius: 8px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
            font-family: sans-serif;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #mission-lightbox .mission-links {
            margin-top: 16px;
            display: flex;
            gap: 24px;
            align-items: center;
        }

        #mission-lightbox .mission-link-item {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        #mission-lightbox .mission-link-item:hover {
            opacity: 1;
        }

        #mission-lightbox .mission-link-item img,
        #mission-lightbox .mission-link-item svg {
            width: 20px;
            height: 20px;
        }

        #mission-lightbox .mission-pages-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            text-decoration: underline;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        #mission-lightbox .mission-pages-link:hover {
            opacity: 1;
        }

        #mission-lightbox .mission-pages-link .external-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        /* Screenshot showcase */
        #screenshot-showcase {
            position: absolute;
            top: 18%;
            left: 10vw;
            z-index: 800;
            text-align: left;
            pointer-events: auto;
        }

        .screenshot-item {
            display: inline-block;
            position: relative;
            cursor: pointer;
            max-width: 90vw;
            opacity: 0.5;
            transition: opacity 0.3s ease;
        }

        .screenshot-item:hover {
            opacity: 0.8;
        }

        .screenshot-item img.screenshot-img {
            max-width: 100%;
            height: auto;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        .screenshot-item .gh-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .screenshot-item:hover .gh-badge {
            opacity: 1;
        }

        /* Lightbox overlay */
        #lightbox-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 5000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #lightbox-overlay.active {
            display: flex;
        }

        #lightbox-overlay img.lightbox-img {
            max-width: 90vw;
            max-height: 80vh;
            border-radius: 8px;
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        #lightbox-overlay .lightbox-links {
            margin-top: 16px;
            display: flex;
            gap: 24px;
            align-items: center;
        }

        #lightbox-overlay .lightbox-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        #lightbox-overlay .lightbox-link:hover {
            opacity: 1;
        }

        #lightbox-overlay .lightbox-link img {
            width: 20px;
            height: 20px;
            filter: invert(1);
        }

        #lightbox-overlay .lightbox-pages-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #fff;
            text-decoration: underline;
            font-size: 14px;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        #lightbox-overlay .lightbox-pages-link:hover {
            opacity: 1;
        }

        #lightbox-overlay .lightbox-pages-link .external-icon {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        #giscus-container {
            position: absolute;
            width: 100%;
            left: 50%;
            transform: translateX(-50%);
            top: 20%;
            z-index: 1000;
            opacity: 0.9;
            padding: 2% 2%;
            box-sizing: border-box;
            max-height: 80vh;
            overflow-y: auto;
            background-color: rgba(180, 220, 255, 0.5);
        }
        @media (orientation: landscape) {
            #giscus-container {
                width: 50%;
            }
        }
    </style>
</head>

<script>
    console.log('Script started executing');

    // Repository details for the experiments
    const repositoryOwner = 'xn-intenton-z2a';
    const repositoryName = 'repository0';

    // Variables for terminal display
    let intentionLines = [];
    let terminalTimeout;
    let currentLineIndex = 0;
    let currentCharIndex = 0;
    let isTyping = false;
    let typingSpeed = 5; // 5 milliseconds per character
    let linePauseDuration = 100; // 1/10 second pause at end of line

    // Function to type a character at a time in the terminal
    function typeCharacter() {
        if (intentionLines.length === 0 || currentLineIndex >= intentionLines.length) {
            currentLineIndex = 0; // Reset to beginning if we've gone through all lines
            // Clear the screen only when we've gone through all lines
            const terminalOutput = document.getElementById('terminal-output');
            terminalOutput.textContent = '';
        }

        const terminalOutput = document.getElementById('terminal-output');
        const terminalContainer = document.getElementById('terminal-container');
        const currentLine = intentionLines[currentLineIndex];

        if (currentCharIndex < currentLine.length) {
            // Add the next character
            terminalOutput.textContent += currentLine.charAt(currentCharIndex);
            currentCharIndex++;

            // Auto-scroll to the bottom to ensure the latest content is visible
            terminalContainer.scrollTop = terminalContainer.scrollHeight;

            // Schedule next character
            terminalTimeout = setTimeout(typeCharacter, typingSpeed);
        } else {
            // Finished typing the line, pause before starting next line
            isTyping = false;
            terminalTimeout = setTimeout(startNextLine, linePauseDuration);
        }
    }

    // Function to start typing the next line
    function startNextLine() {
        if (isTyping) return;

        isTyping = true;
        currentCharIndex = 0;

        // Increment line index
        currentLineIndex = (currentLineIndex + 1) % intentionLines.length;

        // Add a newline character before starting the next line (except for the first line)
        if (currentLineIndex !== 0) {
            const terminalOutput = document.getElementById('terminal-output');
            const terminalContainer = document.getElementById('terminal-container');
            terminalOutput.textContent += '\n';

            // Auto-scroll to the bottom to ensure the latest content is visible
            terminalContainer.scrollTop = terminalContainer.scrollHeight;
        }

        // Start typing the next line
        typeCharacter();
    }

    // Function to start the terminal display
    function startTerminalDisplay() {
        // Don't start if there are no lines or already typing
        if (intentionLines.length === 0 || isTyping) return;

        // Clear any existing timeout
        if (terminalTimeout) clearTimeout(terminalTimeout);

        // Start typing the first line
        startNextLine();
    }

    // Function to poll for agent-log files and update the terminal display
    function pollIntentionUrl() {
        var contentsApiUrl = 'https://api.github.com/repos/' + repositoryOwner + '/' + repositoryName + '/contents/?ref=agentic-lib-logs';

        fetch(contentsApiUrl)
            .then(function(response) {
                if (!response.ok) throw new Error('Network response was not ok');
                return response.json();
            })
            .then(function(files) {
                // Filter for agent-log-*.md files and sort by name (contains timestamp)
                var logFiles = files
                    .filter(function(f) { return f.name.indexOf('agent-log-') === 0 && f.name.endsWith('.md'); })
                    .sort(function(a, b) { return a.name.localeCompare(b.name); });

                // Take last 5
                var recentLogs = logFiles.slice(-5);

                if (recentLogs.length === 0) {
                    // Fallback to the old single intentïon.md file
                    var fallbackUrl = 'https://raw.githubusercontent.com/' + repositoryOwner + '/' + repositoryName + '/agentic-lib-logs/intenti%C3%B6n.md';
                    return fetch(fallbackUrl).then(function(r) {
                        if (!r.ok) return [];
                        return r.text().then(function(t) { return [t]; });
                    });
                }

                // Fetch all log file contents via raw URLs
                return Promise.all(recentLogs.map(function(f) {
                    return fetch(f.download_url).then(function(r) { return r.text(); });
                }));
            })
            .then(function(contents) {
                if (!contents || contents.length === 0) return;

                // Concatenate all log contents
                var combined = contents.join('\n\n');
                var lines = combined.split('\n').filter(function(line) { return line.trim() !== ''; });

                intentionLines = lines;
                console.log('Stored ' + intentionLines.length + ' lines from ' + contents.length + ' agent-log file(s)');

                // Start the terminal display if not already typing
                if (!isTyping) {
                    startTerminalDisplay();
                }
            })
            .catch(function(error) {
                console.error('Error fetching agent-log files:', error);
            });
    }

    // Poll immediately and then every 5 minutes
    pollIntentionUrl();
    setInterval(pollIntentionUrl, 300000); // 300000 ms = 5 minutes

    // Screenshot showcase — fetch from repository0 and display with lightbox
    var screenshotSources = [
        {
            owner: 'xn-intenton-z2a',
            repo: 'repository0',
            file: 'SCREENSHOT_INDEX.png',
            branch: 'agentic-lib-logs'
        }
    ];

    function buildScreenshotShowcase() {
        var showcase = document.getElementById('screenshot-showcase');
        var lightbox = document.getElementById('lightbox-overlay');
        var lightboxImg = lightbox.querySelector('.lightbox-img');
        var lightboxLink = lightbox.querySelector('.lightbox-link');
        var lightboxPagesLink = lightbox.querySelector('.lightbox-pages-link');

        screenshotSources.forEach(function(source) {
            var imgUrl = 'https://raw.githubusercontent.com/' + source.owner + '/' + source.repo + '/' + source.branch + '/' + source.file;
            var repoUrl = 'https://github.com/' + source.owner + '/' + source.repo;
            var pagesUrl = 'https://' + source.owner + '.github.io/' + source.repo + '/';

            var item = document.createElement('div');
            item.className = 'screenshot-item';

            var img = document.createElement('img');
            img.className = 'screenshot-img';
            img.src = imgUrl;
            img.alt = source.repo + ' screenshot';
            img.loading = 'lazy';

            var badge = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            badge.setAttribute('class', 'gh-badge');
            badge.setAttribute('viewBox', '0 0 16 16');
            badge.setAttribute('fill', '#333');
            badge.innerHTML = '<path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>';

            item.appendChild(img);
            item.appendChild(badge);

            // Click to open lightbox
            item.addEventListener('click', function(e) {
                e.stopPropagation();
                lightboxImg.src = imgUrl;
                lightboxImg.alt = source.repo + ' screenshot';
                lightboxLink.href = repoUrl;
                lightboxPagesLink.href = pagesUrl;
                lightbox.classList.add('active');
            });

            showcase.appendChild(item);
        });

        // Close lightbox on click outside image
        lightbox.addEventListener('click', function(e) {
            if (e.target === lightbox) {
                lightbox.classList.remove('active');
            }
        });

        // Close lightbox on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                lightbox.classList.remove('active');
            }
        });
    }

    buildScreenshotShowcase();

    // Mission lightbox — fetch MISSION.md from repository0 and display
    function buildMissionLightbox() {
        var missionLink = document.getElementById('mission-link');
        var missionLightbox = document.getElementById('mission-lightbox');
        var missionContent = document.getElementById('mission-content');
        var missionUrl = 'https://raw.githubusercontent.com/xn-intenton-z2a/repository0/main/MISSION.md';

        var missionText = null;

        // Fetch MISSION.md on page load
        fetch(missionUrl)
            .then(function(response) {
                if (!response.ok) throw new Error('Failed to fetch MISSION.md');
                return response.text();
            })
            .then(function(text) {
                missionText = text;
                console.log('Fetched MISSION.md (' + text.length + ' chars)');
            })
            .catch(function(err) {
                console.error('Error fetching MISSION.md:', err);
                missionText = '(Could not load MISSION.md)';
            });

        // Open lightbox on click
        missionLink.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            missionContent.textContent = missionText || 'Loading...';
            missionLightbox.classList.add('active');
        });

        // Close lightbox on click outside content
        missionLightbox.addEventListener('click', function(e) {
            if (e.target === missionLightbox) {
                missionLightbox.classList.remove('active');
            }
        });

        // Close on Escape
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                missionLightbox.classList.remove('active');
            }
        });
    }

    buildMissionLightbox();
</script>
