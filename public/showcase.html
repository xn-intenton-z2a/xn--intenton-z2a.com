<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>intentïon showcase</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1d21;
            color: #ccc;
            font-family: sans-serif;
            min-height: 100vh;
        }

        .fog-bg {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: url('images/assets/vecteezy_white-fog-illustration_24065547-centre.png') no-repeat center center;
            background-size: cover;
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: relative;
            z-index: 2;
            padding: 1em 1.5em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .brand {
            color: #aaa;
            font-size: 1.2em;
            text-decoration: none;
        }

        nav .links a {
            color: #888;
            text-decoration: none;
            font-size: 0.9em;
            margin-left: 1.2em;
        }

        nav .links a:hover {
            color: #ccc;
            text-decoration: underline;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
            padding: 1em 2em 3em;
        }

        h1 {
            color: #ddd;
            font-size: 1.8em;
            margin-bottom: 0.3em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 2em;
        }

        .loading {
            text-align: center;
            color: #888;
            padding: 3em 0;
        }

        .error {
            text-align: center;
            color: #c77;
            padding: 2em 0;
        }

        .experiment {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 1.5em;
            margin-bottom: 1.2em;
        }

        .experiment h2 {
            color: #ddd;
            font-size: 1.2em;
            margin: 0 0 0.5em 0;
        }

        .experiment h2 a {
            color: #7ab;
            text-decoration: none;
        }

        .experiment h2 a:hover {
            text-decoration: underline;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 0.8em;
            margin-top: 0.8em;
        }

        .stat {
            background: rgba(255,255,255,0.04);
            border-radius: 4px;
            padding: 0.7em;
            text-align: center;
        }

        .stat .value {
            font-size: 1.5em;
            color: #ddd;
            font-weight: bold;
        }

        .stat .label {
            font-size: 0.8em;
            color: #888;
            margin-top: 0.2em;
        }

        .activity {
            color: #999;
            font-size: 0.85em;
            margin-top: 0.8em;
        }

        .commits {
            margin-top: 0.8em;
            padding-left: 0;
            list-style: none;
        }

        .commits li {
            color: #888;
            font-size: 0.85em;
            padding: 0.2em 0;
            font-family: monospace;
        }

        footer {
            text-align: center;
            color: #555;
            font-size: 0.8em;
            padding: 2em 0;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

<div class="fog-bg"></div>

<nav>
    <a href="index.html" class="brand">intentïon</a>
    <div class="links">
        <a href="index.html">Home</a>
        <a href="https://github.com/xn-intenton-z2a/agentic-lib">GitHub</a>
    </div>
</nav>

<div class="container">
    <h1>Showcase</h1>
    <p class="subtitle">Live experiment status from the intentïon autonomous pipeline</p>

    <div id="experiments">
        <div class="loading" id="loadingMsg">Loading experiment data...</div>
    </div>
</div>

<footer>
    <p>Data from <a href="https://agentic-lib-public-website-stats-bucket.s3.eu-west-2.amazonaws.com/" style="color:#777">agentic-lib stats pipeline</a></p>
</footer>

<script>
var STATS_BASE = 'https://agentic-lib-public-website-stats-bucket.s3.eu-west-2.amazonaws.com/';
var STATS_FILES = [
    'agentic-lib-stats.json',
    'repository0-stats.json'
];

var container = document.getElementById('experiments');
var loadingMsg = document.getElementById('loadingMsg');

function renderExperiment(data) {
    var div = document.createElement('div');
    div.className = 'experiment';

    var repoName = data.repo || 'unknown';
    var repoUrl = 'https://github.com/xn-intenton-z2a/' + repoName;

    var html = '<h2><a href="' + repoUrl + '" target="_blank">' + repoName + '</a></h2>';

    html += '<div class="stats-grid">';
    html += renderStat(data.openIssues, 'Open Issues');
    html += renderStat(data.openPRs, 'Open PRs');
    html += renderStat(data.issuesClosedLastDay, 'Closed (24h)');
    html += renderStat(data.commitsLastDay, 'Commits (24h)');
    html += renderStat(data.branches ? data.branches.count : '--', 'Branches');
    html += renderStat(data.diffMinutes !== undefined ? data.diffMinutes + 'm' : '--', 'Since Push');
    html += '</div>';

    if (data.lastActivityName) {
        html += '<div class="activity">Last activity: <strong>' + data.lastActivityName + '</strong>';
        if (data.lastActivityBranchName) {
            html += ' on ' + data.lastActivityBranchName;
        }
        if (data.statsGeneratedAt) {
            html += ' at ' + data.statsGeneratedAt;
        }
        html += '</div>';
    }

    if (data.lastFiveCommitMessages && data.lastFiveCommitMessages.length > 0) {
        html += '<ul class="commits">';
        data.lastFiveCommitMessages.forEach(function(msg) {
            html += '<li>' + escapeHtml(msg) + '</li>';
        });
        html += '</ul>';
    }

    div.innerHTML = html;
    return div;
}

function renderStat(value, label) {
    var v = value !== undefined && value !== null ? value : '--';
    return '<div class="stat"><div class="value">' + v + '</div><div class="label">' + label + '</div></div>';
}

function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

var loaded = 0;
var errors = 0;

STATS_FILES.forEach(function(file) {
    fetch(STATS_BASE + file)
        .then(function(res) {
            if (!res.ok) throw new Error('HTTP ' + res.status);
            return res.json();
        })
        .then(function(data) {
            loadingMsg.style.display = 'none';
            container.appendChild(renderExperiment(data));
        })
        .catch(function(err) {
            errors++;
            console.error('Failed to load ' + file + ':', err);
            if (errors === STATS_FILES.length) {
                loadingMsg.className = 'error';
                loadingMsg.textContent = 'Could not load experiment data. Stats may be temporarily unavailable.';
            }
        })
        .finally(function() {
            loaded++;
        });
});
</script>

</body>
</html>
